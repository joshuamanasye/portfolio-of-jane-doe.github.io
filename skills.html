<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills — Jane Doe</title>
    <link rel="stylesheet" href="main.css">
    <link rel="stylesheet" href="skills.css">
</head>
<body>
    <div id="loader"><div id="loader-track"><div id="loader-bar"></div></div></div>

    <a href="index.html" id="back-btn">← menu</a>

    <!-- Atmosphere -->
    <div id="noise"></div>
    <div id="grain"></div>
    <div id="vignette"></div>

    <!-- Case strip -->
    <div id="case-strip">
        <span class="cs-num">CASE 001</span>
        <span class="cs-sep">·</span>
        <span class="cs-name">JANE DOE</span>
        <span class="cs-sep">·</span>
        <span class="cs-room">examination</span>
    </div>

    <div id="exam-room">

        <!-- Autopsy table + body -->
        <div id="table">
            <div id="body">
                <img src="./assets/body.png" alt="autopsy subject — case 001" draggable="false">

                <!-- Evidence pins (head left → feet right) -->
                <button class="pin" data-finding="skull"  style="left:27%; top:52%;" aria-label="examine skull">1</button>
                <button class="pin" data-finding="hands"  style="left:48%; top:63%;" aria-label="examine hands">2</button>
                <button class="pin" data-finding="chest"  style="left:35%; top:42%;" aria-label="examine chest cavity">3</button>
                <button class="pin" data-finding="skin"   style="left:58%; top:50%;" aria-label="examine skin markings">4</button>
                <button class="pin" data-finding="cavity" style="left:70%; top:55%;" aria-label="examine sealed cavity">5</button>
            </div>
        </div>

        <!-- Finding card -->
        <div id="finding" class="hidden">
            <button id="finding-close" aria-label="close">✕</button>
            <div id="finding-body"></div>
        </div>

    </div>

    <!-- Examine hint -->
    <div id="examine-hint">select an evidence marker — or press 1–5</div>

    <!-- Cross-reference to other case sections -->
    <nav id="exits" aria-label="other rooms">
        <span id="exits-label">cross-reference</span>
        <a class="xlink" href="about.html">about</a>
        <a class="xlink" href="work.html">work</a>
        <a class="xlink" href="contact.html">contact</a>
        <a class="xlink" href="resume.html">resume</a>
    </nav>

    <script src="./js/skills.js"></script>
</body>
</html>
